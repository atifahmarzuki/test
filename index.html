<!DOCTYPE html>
<html>
<head>
    <title>Contact Me</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <h1><i class="fas fa-envelope"></i> Contact Me</h1>
    
    <img src="https://picsum.photos/id/20/300/150" alt="Contact us" width="300">
    
    <form action="#" method="POST">
        <label for="name"><i class="fas fa-user"></i> Name:</label>
        <input type="text" id="name" name="name" placeholder="Your full name">
        <br><br>
        
        <label for="email"><i class="fas fa-envelope"></i> Email:</label>
        <input type="text" id="email" name="email" placeholder="yourname@example.com">
        <br><br>
        
        <!-- Students add radio buttons here -->
        
        <!-- Students add checkboxes here -->
        
        <label for="message"><i class="fas fa-comment"></i> Message:</label>
        <br>
        <textarea id="message" name="message" rows="4" cols="40" placeholder="Type your message here..."></textarea>
        <br><br>
        
        <input type="submit" value="Send Message">
    </form>
    
    <h2><i class="fas fa-video"></i> Watch this video</h2>
    <video width="400" controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

</body>
</html>
